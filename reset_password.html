<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reset Password</title>
  <style>
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      background:#eef4fb;
      display:grid;
      place-items:center;
      min-height:100vh;
    }

    .card{
      width:420px;
      background:white;
      border:1px solid #dbeafe;
      border-radius:18px;
      padding:26px;
      box-shadow:0 18px 40px rgba(8,23,46,.12);
    }

    h2{
      text-align:center;
      color:#12203a;
      margin-top:0;
    }

    label{
      font-weight:800;
      color:#46536a;
      font-size:13px;
      margin-top:14px;
      display:block;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #cfd9e8;
      margin-top:6px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      margin-top:20px;
      padding:13px;
      border:0;
      border-radius:12px;
      color:white;
      font-weight:900;
      background:linear-gradient(180deg,#1f5fbf,#144a9b);
      cursor:pointer;
    }

    .error{
      margin-top:12px;
      color:#b42318;
      font-weight:800;
      text-align:center;
      font-size:13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Reset Password</h2>

    <form method="POST" action="/reset_password/{{ token }}">
  <label>Username or Email</label>
  <input type="text" name="identity" placeholder="Enter username or email" required>

  <label>New Password</label>
  <input type="password" name="password" required>

  <label>Confirm Password</label>
  <input type="password" name="confirm_password" required>

  <button type="submit">Update Password</button>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
</form>
  </div>
</body>
</html>
